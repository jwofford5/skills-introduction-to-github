<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SWAT Tactical Simulator — Hostage Rescue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="top-bar">
      <div id="scenario-label">Hostage Rescue — Single Structure</div>
      <div id="step-counter"><span id="step-current">1</span> / <span id="step-total">30</span></div>
    </header>

    <main id="sim-main">
      <div id="step-title">Stack at front door</div>
      <div id="callout-bar">
        <span id="callout-icon">📡</span>
        <span id="callout-text">Awaiting initiation…</span>
      </div>

      <div id="floorplan-wrap">
        <canvas id="floorplan" width="360" height="480"></canvas>
      </div>

      <div id="teaching-bar">
        <span id="teaching-text"></span>
      </div>
    </main>

    <div id="controls">
      <button id="btn-prev" class="ctrl-btn" aria-label="Previous">&#9664;</button>
      <button id="btn-play" class="ctrl-btn primary" aria-label="Play">&#9654;</button>
      <button id="btn-next" class="ctrl-btn" aria-label="Next">&#9654;&#9654;</button>
    </div>

    <div id="overlay-toggles">
      <button class="ov-btn active" data-ov="operators">Operators</button>
      <button class="ov-btn" data-ov="angles">Angles</button>
      <button class="ov-btn" data-ov="roles">Roles</button>
      <button class="ov-btn" data-ov="notes">Notes</button>
    </div>

    <div id="operator-tray" class="tray hidden">
      <div id="tray-handle"><span>▼ Operators</span></div>
      <div id="operator-list"></div>
    </div>

    <div id="role-sheet" class="bottom-sheet hidden">
      <div class="sheet-header">
        <span id="role-sheet-name"></span>
        <button id="role-sheet-close">✕</button>
      </div>
      <div id="role-sheet-body"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="simulator.js"></script>
</body>
</html>
