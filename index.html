<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SWAT Tactical Movement</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <div id="top-bar">
      <span id="site-label">SWAT MOVEMENT</span>
      <span id="concept-counter"></span>
    </div>

    <div id="title-wrap">
      <div id="concept-num-label">CONCEPT</div>
      <div id="concept-title"></div>
    </div>

    <div id="visual-wrap">
      <svg id="scene-svg" viewBox="0 0 340 220" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="radio-traffic" class="hidden"></div>
    </div>

    <div id="text-wrap">
      <p id="concept-body"></p>
      <div id="concept-callout" class="callout-block hidden"></div>
      <div id="concept-rule" class="rule-block hidden"></div>
    </div>

    <div id="nav-bar">
      <button id="btn-prev" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div id="dots"></div>
      <button id="btn-next" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

  </div>
  <script src="main.js"></script>
</body>
</html>
